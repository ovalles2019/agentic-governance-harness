services:
  - type: web
    name: agentic-governance-demo
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /healthz
  - type: web
    name: supply-chain-agent-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt && python -m grpc_tools.protoc -I proto --python_out=src/grpc_gen --grpc_python_out=src/grpc_gen proto/inventory.proto
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      # Optional: set ONE of these in the Render dashboard to run the LLM judge
      # against a real model (latency & cost become measured). Leave blank to use
      # the deterministic simulation — the demo works either way.
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # Optional: override the judge model (e.g. gpt-4o, claude-3-5-sonnet-latest).
      - key: JUDGE_MODEL
        sync: false
